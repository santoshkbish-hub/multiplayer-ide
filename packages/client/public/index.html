<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>collab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #faf6ef;
        --panel: #fff8ea;
        --panel-2: #f4ead4;
        --border: #e7dcc4;
        --rule: #d9cdb4;
        --ink: #201a14;
        --muted: #6c604f;
        --muted-2: #8a7c66;
        --accent: #9a3412;     /* brick red — primary action */
        --accent-soft: #fde6da;
        --accent-on: #ffffff;
        --good: #5b8c3f;       /* sage — assistant accent + connected */
        --good-soft: #e3eed4;
        --error: #b91c1c;
        --error-soft: #fbe1e1;
        --code-bg: #f3e6c8;
        --code-ink: #5b3a1e;
      }
      * { box-sizing: border-box; }
      body {
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        margin: 0;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--bg);
        color: var(--ink);
      }
      #workspace {
        display: grid;
        grid-template-columns: 280px 1fr;
        overflow: hidden;
        min-height: 0;
      }
      #side {
        border-right: 1px solid var(--border);
        background: var(--panel);
        display: grid;
        grid-template-rows: 1fr 1fr;
        min-height: 0;
      }
      #files, #viewer {
        overflow: auto;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
      }
      #files { border-bottom: 1px solid var(--border); }
      .pane-head {
        padding: 6px 10px;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        position: sticky;
        top: 0;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pane-head button {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 6px;
        cursor: pointer;
        font: inherit;
      }
      .pane-head button:hover { color: var(--accent); border-color: var(--accent); }
      #fileList { padding: 4px 8px; background: var(--panel); }
      file-tree {
        display: block;
        --padding: 3px;
        --icon-size: 12px;
        --hover-color: #9a3412;
        --border-color: #b8a987;
        color: var(--ink);
      }
      #fileList .empty { padding: 6px 6px; color: var(--muted); font-style: italic; }
      #viewer { background: var(--panel); }
      #viewer pre {
        margin: 0;
        padding: 10px 12px;
        white-space: pre;
        font-size: 12px;
        line-height: 1.45;
        color: var(--ink);
      }
      #viewer .empty {
        padding: 20px 12px;
        color: var(--muted);
        font-style: italic;
        font-family: -apple-system, system-ui, sans-serif;
      }
      #main {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: var(--bg);
      }
      header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--rule);
        background: var(--panel);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; color: var(--accent); }
      header .who { font-size: 13px; color: var(--muted); }
      header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
      header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted-2); margin-right: 6px; vertical-align: middle; }
      header.connected .dot { background: var(--good); }
      header.error .dot { background: var(--error); }

      #transcript {
        flex: 1;
        overflow: auto;
        padding: 18px 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        font-size: 14px;
      }
      .msg { margin: 0 0 12px; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); }
      .msg.user { background: var(--panel); }
      .msg.assistant { background: #ffffff; border-left: 3px solid var(--good); }
      .msg.system { color: var(--muted); font-style: italic; padding: 4px 12px; border: 0; background: transparent; }
      .msg.system .tool {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0;
        font-style: normal;
        overflow: hidden;
      }
      .tool summary {
        cursor: pointer;
        padding: 6px 10px;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        user-select: none;
        color: var(--ink);
      }
      .tool summary::-webkit-details-marker { display: none; }
      .tool summary::before {
        content: "▸";
        color: var(--muted);
        font-size: 10px;
        width: 8px;
        display: inline-block;
      }
      .tool[open] summary::before { content: "▾"; }
      .tool-name { color: var(--ink); font-weight: 600; }
      .tool-arg { color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .tool-status { margin-left: auto; font-size: 11px; padding: 1px 6px; border-radius: 3px; }
      .tool-status.pending { background: var(--code-bg); color: var(--code-ink); }
      .tool-status.ok { background: var(--good-soft); color: var(--good); }
      .tool-status.err { background: var(--error-soft); color: var(--error); }
      .tool-body {
        margin: 0;
        padding: 8px 10px;
        background: #fffdf6;
        border-top: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        line-height: 1.4;
        color: var(--ink);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        max-height: 320px;
        overflow: auto;
      }
      .msg .who { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
      .msg .body { word-break: break-word; }
      .msg .body p { margin: 0 0 8px; }
      .msg .body p:last-child { margin-bottom: 0; }
      .msg .body ul, .msg .body ol { margin: 4px 0 8px; padding-left: 22px; }
      .msg .body li { margin: 2px 0; }
      .msg .body h1, .msg .body h2, .msg .body h3, .msg .body h4 {
        margin: 10px 0 6px; line-height: 1.25; font-weight: 600;
      }
      .msg .body h1 { font-size: 17px; }
      .msg .body h2 { font-size: 16px; }
      .msg .body h3, .msg .body h4 { font-size: 15px; }
      .msg .body code {
        background: var(--code-bg); color: var(--code-ink);
        padding: 1px 5px; border-radius: 4px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px;
      }
      .msg .body pre {
        background: var(--code-bg); border: 1px solid var(--border);
        padding: 8px 10px; border-radius: 6px;
        overflow-x: auto; margin: 4px 0 8px;
      }
      .msg .body pre code { background: transparent; padding: 0; color: var(--code-ink); font-size: 12.5px; }
      .msg .body blockquote {
        margin: 4px 0 8px; padding: 4px 10px;
        border-left: 3px solid var(--rule); color: var(--muted);
      }
      .msg .body a { color: var(--accent); }
      .msg .body table { border-collapse: collapse; margin: 4px 0 8px; }
      .msg .body th, .msg .body td { border: 1px solid var(--border); padding: 4px 8px; }
      .msg .body hr { border: 0; border-top: 1px solid var(--rule); margin: 8px 0; }

      footer {
        padding: 12px 16px;
        border-top: 1px solid var(--rule);
        background: var(--panel);
        display: flex;
        gap: 8px;
      }
      footer textarea {
        flex: 1;
        resize: none;
        background: #ffffff;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        min-height: 56px;
        max-height: 200px;
      }
      footer textarea:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
      footer button {
        background: var(--accent);
        color: var(--accent-on);
        border: 0;
        border-radius: 6px;
        padding: 0 20px;
        font-weight: 600;
        cursor: pointer;
      }
      footer button:hover:not(:disabled) { background: #7c2a0e; }
      footer button:disabled { opacity: 0.5; cursor: not-allowed; }

      /* gate */
      #gate {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        padding: 24px;
      }
      #gate .card {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 28px;
        border-radius: 12px;
        width: 100%;
        max-width: 560px;
        box-shadow: 0 6px 24px rgba(120, 95, 60, 0.10);
      }
      #gate h2 { margin: 0 0 6px; font-size: 18px; color: var(--accent); }
      #gate p { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
      #gate input {
        width: 100%;
        background: #ffffff;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        margin-bottom: 12px;
      }
      #gate input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
      #gate button {
        background: var(--accent);
        color: var(--accent-on);
        border: 0;
        border-radius: 6px;
        padding: 10px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      #gate button:hover:not(:disabled) { background: #7c2a0e; }
      #join { width: 100%; }
      #sessionPanel {
        margin-top: 18px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }
      .session-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      .session-actions button.secondary,
      .session-row button.secondary {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--border);
      }
      .session-actions button.secondary:hover,
      .session-row button.secondary:hover { color: var(--accent); border-color: var(--accent); }
      #sessionList {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 320px;
        overflow: auto;
      }
      .session-row {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        display: grid;
        gap: 8px;
        background: #ffffff;
      }
      .session-main {
        display: flex;
        gap: 8px;
        align-items: center;
        min-width: 0;
      }
      .session-id {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        color: var(--ink);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-meta {
        color: var(--muted);
        font-size: 12px;
      }
      .row-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      #gate .err { color: var(--error); font-size: 12px; min-height: 1em; margin: 6px 0 0; }
      #gate .doc-links {
        margin: 18px 0 0;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      #gate .doc-links a { color: var(--muted); text-decoration: none; margin: 0 4px; }
      #gate .doc-links a:hover { color: var(--accent); }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="gate">
      <div class="card">
        <h2>collab</h2>
        <p>Pick a name. Then join an active session or start a new one. Existing chats for a session reopen with the same chat id.</p>
        <input id="name" placeholder="e.g. alice" autocomplete="off" autofocus maxlength="32" />
        <button id="join">continue</button>
        <section id="sessionPanel" class="hidden">
          <div class="session-actions">
            <button id="newSession">start new session</button>
            <button id="reloadSessions" class="secondary">refresh</button>
          </div>
          <div id="sessionList"></div>
        </section>
        <p class="err" id="gateErr"></p>
        <p class="doc-links">
          <a href="/flows.html" target="_blank" rel="noopener">flows</a>
          <span aria-hidden="true">·</span>
          <a href="/design.html" target="_blank" rel="noopener">design</a>
        </p>
      </div>
    </div>

    <header id="header">
      <span class="dot"></span>
      <h1>collab</h1>
      <span class="who" id="who"></span>
      <span class="status" id="status">connecting…</span>
    </header>
    <div id="workspace">
      <aside id="side">
        <section id="files">
          <div class="pane-head">
            <span>files</span>
            <button id="refreshFiles" title="refresh">↻</button>
          </div>
          <div id="fileList"></div>
        </section>
        <section id="viewer">
          <div class="pane-head"><span id="viewerPath">no file selected</span></div>
          <div id="viewerBody"><div class="empty">click a file to preview</div></div>
        </section>
      </aside>
      <main id="main">
        <div id="transcript"></div>
      </main>
    </div>
    <footer>
      <textarea id="prompt" placeholder="ask anything — e.g. add a function adder(a,b) to src/foo.ts" rows="2"></textarea>
      <button id="send" disabled>send</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
